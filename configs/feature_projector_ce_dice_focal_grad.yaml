dataset:
  image_dir: data/CarDD_release/CarDD_release/CarDD_SOD/CarDD-TR/CarDD-TR-Image
  mask_dir: data/CarDD_release/CarDD_release/CarDD_SOD/CarDD-TR/CarDD-TR-Mask
  train_split: data/splits/train.json
  val_split: data/splits/val.json
  test_split: data/splits/test.json
  image_size: 512

model:
  name: unet
  in_channels: 3
  base_channels: 32
  num_classes: 2
  feature_projector:
    enabled: true
    out_channels: 64
    hidden_channels: 64
    num_layers: 2
    dropout: 0.1
    use_residual: false

training:
  epochs: 10
  batch_size: 8
  lr: 0.001
  weight_decay: 0.0001
  loss:
    name: ce_dice_focal
    use_gradient: true
    gradient_foreground_class: 1
    focal_gamma: 2.0
    focal_alpha: 0.25
    weights:
      ce: 1.0
      dice: 1.0
      focal: 1.0
      grad: 0.5
  scheduler:
    name: cosine_annealing
    t_max: 25
    eta_min: 0.000001
    factor: 0.5
    patience: 3
    mode: min
    threshold: 0.0001
    threshold_mode: rel
    cooldown: 0
    min_lr: 0.000001
  num_workers: 0
  output_dir: outputs/feature_projector_ce_dice_focal_grad
  visualize_every: 10
  visualize_samples: 3
  tensorboard: true
  tensorboard_dir: outputs/feature_projector_ce_dice_focal_grad/tensorboard
