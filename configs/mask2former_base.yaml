dataset:
  image_dir: CarDD_release/CarDD_SOD/CarDD-TR/CarDD-TR-Image
  mask_dir: CarDD_release/CarDD_SOD/CarDD-TR/CarDD-TR-Mask
  train_split: data/splits/train.json
  val_split: data/splits/val.json
  test_split: data/splits/test.json
  image_size: 512
  class_labels_file: null
  default_class_label: 0
  infer_class_from_mask: false

model:
  name: mask2former
  num_classes: 2
  pretrained_model_name: facebook/mask2former-swin-base-ade-semantic

training:
  epochs: 10
  batch_size: 2
  lr: 0.0001
  weight_decay: 0.0001
  loss:
    name: ce_dice  # options: ce | dice | focal | grad | ce_dice | ce_focal | dice_focal | ce_dice_focal
    use_gradient: false
    gradient_foreground_class: 1
    focal_gamma: 2.0
    focal_alpha: 0.25
    weights:
      ce: 1.0
      dice: 1.0
      focal: 1.0
      grad: 1.0
      contrastive: 0.2
      cls: 1.0
      cls_contrastive: 0.2
    contrastive:
      enabled: false
      foreground_class_index: 1
      tiny_area_threshold_pixels: 2048
      temperature: 0.1
      max_tiny_samples: 1024
      max_other_samples: 4096
      min_tiny_pixels: 16
    classification:
      enabled: false
      multilabel: true
      threshold: 0.5
      class_contrastive:
        enabled: false
        temperature: 0.1
  scheduler:
    name: cosine_annealing  # options: cosine_annealing | reduce_on_plateau
    t_max: 25
    eta_min: 0.000001
    factor: 0.5
    patience: 3
    mode: min
    threshold: 0.0001
    threshold_mode: rel
    cooldown: 0
    min_lr: 0.000001
  num_workers: 0
  output_dir: outputs/mask2former_base
  visualize_every: 10
  visualize_samples: 3
  tensorboard: true
  tensorboard_dir: outputs/mask2former_base/tensorboard
