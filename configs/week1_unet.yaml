dataset:
  image_dir: data/cardd/images
  mask_dir: data/cardd/masks
  train_split: data/splits/train.json
  val_split: data/splits/val.json
  image_size: 512

model:
  name: unet
  in_channels: 3
  base_channels: 32
  num_classes: 7

training:
  epochs: 25
  batch_size: 8
  lr: 0.001
  weight_decay: 0.0001
  num_workers: 4
  output_dir: outputs/week1_unet
