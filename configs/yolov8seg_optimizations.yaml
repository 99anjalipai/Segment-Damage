    overrides:
      pretrained_weights: yolov8n-seg.pt
      imgsz: 512
      batch: 8
      epochs: 10

  - name: yolov8n_seg_640_e25
    overrides:
      pretrained_weights: yolov8n-seg.pt
      imgsz: 640
      batch: 8
      epochs: 25

  - name: yolov8s_seg_512_e25
    overrides:
      pretrained_weights: yolov8s-seg.pt
      imgsz: 512
      batch: 8
      epochs: 25

  - name: yolov8s_seg_640_e25
    overrides:
      pretrained_weights: yolov8s-seg.pt
      imgsz: 640
      batch: 8
      epochs: 25